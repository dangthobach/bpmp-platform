syntax = "proto3";

package bpmp.human.v1;

import "bpmp/authorization/v1/authorization.proto";

service HumanRuntimeService {
  rpc GetWorkItem(GetWorkItemRequest) returns (GetWorkItemResponse);
  rpc ListWorkItems(ListWorkItemsRequest) returns (ListWorkItemsResponse);
  rpc CompleteWorkItem(CompleteWorkItemRequest) returns (CompleteWorkItemResponse);
  rpc DelegateWorkItem(DelegateWorkItemRequest) returns (DelegateWorkItemResponse);
  rpc GetCase(GetCaseRequest) returns (GetCaseResponse);
  rpc ListAuditRecords(ListAuditRecordsRequest) returns (ListAuditRecordsResponse);
}

message GetWorkItemRequest {
  string tenant_id = 1;
  string work_item_id = 2;
  bpmp.authorization.v1.ActorProof actor_proof = 3;
}

message GetWorkItemResponse {
  WorkItem work_item = 1;
}

message ListWorkItemsRequest {
  string tenant_id = 1;
  uint32 page_size = 2;
  string page_token = 3;
  bpmp.authorization.v1.ActorProof actor_proof = 4;
}

message ListWorkItemsResponse {
  repeated WorkItem work_items = 1;
  string next_page_token = 2;
}

message CompleteWorkItemRequest {
  string tenant_id = 1;
  string work_item_id = 2;
  string command_id = 3;
  string correlation_id = 4;
  string decision = 5;
  int64 expected_version = 6;
  bpmp.authorization.v1.ActorProof actor_proof = 7;
}

message DelegateWorkItemRequest {
  string tenant_id = 1;
  string work_item_id = 2;
  string command_id = 3;
  string correlation_id = 4;
  int64 expected_version = 5;
  string assignee_id = 6;
  string candidate_group = 7;
  bpmp.authorization.v1.ActorProof actor_proof = 8;
}

message CompleteWorkItemResponse {
  string command_id = 1;
  int64 work_item_version = 2;
}

message DelegateWorkItemResponse {
  string command_id = 1;
  int64 work_item_version = 2;
}

message WorkItem {
  string tenant_id = 1;
  string work_item_id = 2;
  string instance_id = 3;
  string workflow_type = 4;
  string workflow_version = 5;
  string node_id = 6;
  string task_type = 7;
  string assignee_id = 8;
  string candidate_group = 9;
  string form_key = 10;
  string status = 11;
  string decision = 12;
  uint64 sla_deadline_epoch_ms = 13;
  int64 version = 14;
}

message GetCaseRequest {
  string tenant_id = 1;
  string case_id = 2;
  bpmp.authorization.v1.ActorProof actor_proof = 3;
}

message GetCaseResponse {
  CaseView case = 1;
}

message CasePlanItem {
  string plan_item_id = 1;
  string kind = 2;
  string status = 3;
  int64 version = 4;
}

message CaseView {
  string tenant_id = 1;
  string case_id = 2;
  string case_type = 3;
  string status = 4;
  repeated CasePlanItem plan_items = 5;
  int64 version = 6;
}

message ListAuditRecordsRequest {
  string tenant_id = 1;
  string work_item_id = 2;
  string case_id = 3;
  uint32 page_size = 4;
  string page_token = 5;
  bpmp.authorization.v1.ActorProof actor_proof = 6;
}

message ListAuditRecordsResponse {
  repeated AuditRecord records = 1;
  string next_page_token = 2;
}

message AuditRecord {
  string audit_id = 1;
  string work_item_id = 2;
  string case_id = 3;
  string actor_id = 4;
  string action = 5;
  uint64 occurred_at_epoch_ms = 6;
  string command_id = 7;
  string correlation_id = 8;
  int64 from_version = 9;
  int64 to_version = 10;
  bytes details_json = 11;
}
