syntax = "proto3";

package bpmp.storage.v1;

message EncryptedEventRecord {
  uint32 storage_schema_version = 1;
  string key_scope = 2;
  string key_version = 3;
  uint64 key_epoch = 4;
  string algorithm = 5;
  bytes nonce = 6;
  bytes ciphertext = 7;
}

message EncryptedSnapshotRecord {
  uint32 storage_schema_version = 1;
  uint64 snapshot_sequence = 2;
  string key_scope = 3;
  string key_version = 4;
  uint64 key_epoch = 5;
  string algorithm = 6;
  bytes nonce = 7;
  bytes ciphertext = 8;
}

message EncryptedAuthorizationAuditRecord {
  uint32 storage_schema_version = 1;
  string key_scope = 2;
  string key_version = 3;
  uint64 key_epoch = 4;
  string algorithm = 5;
  bytes nonce = 6;
  bytes ciphertext = 7;
}

message EncryptedGovernanceRecord {
  uint32 storage_schema_version = 1;
  string key_scope = 2;
  string key_version = 3;
  uint64 key_epoch = 4;
  string algorithm = 5;
  bytes nonce = 6;
  bytes ciphertext = 7;
}

message CompensationLedgerRecord {
  string tenant_id = 1;
  string instance_id = 2;
  string saga_ref = 3;
  string ledger_entry_id = 4;
  uint64 effect_sequence = 5;
  uint64 ledger_sequence = 6;
  string side_effect_type = 7;
  string target_system = 8;
  string handler_ref = 9;
  string opaque_operation_ref = 10;
  string idempotency_key = 11;
  string status = 12;
  uint64 updated_at_epoch_ms = 13;
}

message ReconciliationWorkItemRecord {
  string tenant_id = 1;
  string instance_id = 2;
  string reconciliation_id = 3;
  string ledger_entry_id = 4;
  string side_effect_type = 5;
  string target_system = 6;
  string handler_ref = 7;
  string opaque_operation_ref = 8;
  uint64 deadline_epoch_ms = 9;
  string status = 10;
}

message GovernanceApprovalAuditRef {
  string actor_id = 1;
  uint64 approved_at_epoch_ms = 2;
  string key_id = 3;
}

message GovernanceDecisionAuditRecord {
  string tenant_id = 1;
  string instance_id = 2;
  string command_id = 3;
  string policy_id = 4;
  bytes request_digest = 5;
  string reason_code = 6;
  GovernanceApprovalAuditRef requester = 7;
  repeated GovernanceApprovalAuditRef approvers = 8;
  uint64 occurred_at_epoch_ms = 9;
}

message StoredCommandResult {
  string command_id = 1;
  uint64 version = 2;
  repeated string event_ids = 3;
  string config_version = 4;
  string policy_version = 5;
}

message OutboxEntry {
  string tenant_id = 1;
  string instance_id = 2;
  uint64 sequence = 3;
  string event_id = 4;
  uint64 outbox_sequence = 5;
}

message BoundarySubscriptionRecord {
  uint32 storage_schema_version = 1;
  string tenant_id = 2;
  string instance_id = 3;
  string boundary_event_id = 4;
  string attached_node_id = 5;
  string target_node_id = 6;
  bool cancel_activity = 7;
  int32 trigger_kind = 8;
  string trigger_reference = 9;
  uint64 armed_at_epoch_ms = 10;
  string armed_event_id = 11;
  BoundaryTimerScheduleRecord timer_schedule = 12;
  reserved 13 to 17;
  uint64 generation = 18;
  uint32 attempts = 19;
  uint64 available_at_epoch_ms = 20;
  uint64 lease_until_epoch_ms = 21;
  uint64 lease_version = 22;
  string worker_id = 23;
  bool dead_lettered = 24;
  string workflow_type = 25;
  string workflow_version = 26;
}

message BoundaryTimerScheduleRecord {
  uint64 due_at_epoch_ms = 1;
  optional uint64 interval_ms = 2;
  optional uint32 remaining_firings = 3;
}

message BoundarySignalRecord {
  uint32 storage_schema_version = 1;
  string signal_id = 2;
  string tenant_id = 3;
  string instance_id = 4;
  int32 signal_kind = 5;
  reserved 6;
  optional string reference = 7;
  uint64 occurred_at_epoch_ms = 8;
  uint32 attempts = 9;
  uint64 available_at_epoch_ms = 10;
  uint64 lease_until_epoch_ms = 11;
  uint64 lease_version = 12;
  string worker_id = 13;
  bool completed = 14;
  bool dead_lettered = 15;
  string authorization_context_ref = 16;
}
