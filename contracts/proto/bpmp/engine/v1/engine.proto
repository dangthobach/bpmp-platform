syntax = "proto3";

package bpmp.engine.v1;

import "bpmp/authorization/v1/authorization.proto";

message CommandEnvelope {
  string tenant_id = 1;
  string instance_id = 2;
  string command_id = 3;
  string idempotency_key = 4;
  string correlation_id = 5;
  string actor_id = 6;
  string workflow_type = 7;
  string workflow_version = 8;
  uint64 occurred_at_epoch_ms = 9;
  oneof command {
    StartWorkflow start_workflow = 10;
    CompleteServiceTask complete_service_task = 11;
  }
  string encryption_key_scope = 12;
  bpmp.authorization.v1.AuthorizationContext authorization_context = 13;
}

message StartWorkflow {}

message CompleteServiceTask {
  string node_id = 1;
}

message EventMetadata {
  string event_id = 1;
  string tenant_id = 2;
  string instance_id = 3;
  uint64 sequence = 4;
  uint32 schema_version = 5;
  string correlation_id = 6;
  string causation_command_id = 7;
  uint64 occurred_at_epoch_ms = 8;
  string config_version = 9;
  string policy_version = 10;
  string actor_id = 11;
  string encryption_key_scope = 12;
}

message EventEnvelope {
  EventMetadata metadata = 1;
  oneof event {
    WorkflowStarted workflow_started = 10;
    ServiceTaskActivated service_task_activated = 11;
    ServiceTaskCompleted service_task_completed = 12;
    WorkflowCompleted workflow_completed = 13;
    DecisionTaskEvaluated decision_task_evaluated = 14;
    GatewaySplitActivated gateway_split_activated = 15;
    GatewayTokenArrived gateway_token_arrived = 16;
    GatewayJoined gateway_joined = 17;
    MultiInstanceStarted multi_instance_started = 18;
    MultiInstanceIterationActivated multi_instance_iteration_activated = 19;
    MultiInstanceIterationCompleted multi_instance_iteration_completed = 20;
    MultiInstanceCompleted multi_instance_completed = 21;
    BoundaryEventTriggered boundary_event_triggered = 22;
    WorkflowBranchCompleted workflow_branch_completed = 23;
    BoundaryEventArmed boundary_event_armed = 24;
    BoundaryEventsDisarmed boundary_events_disarmed = 25;
  }
}

message WorkflowStarted {
  string workflow_type = 1;
  string workflow_version = 2;
  string start_node_id = 3;
  string tenant_id = 4;
}

message ServiceTaskActivated {
  string node_id = 1;
  string task_type = 2;
}

message ServiceTaskCompleted {
  string node_id = 1;
}

message WorkflowCompleted {}

message DecisionTaskEvaluated {
  string node_id = 1;
  string decision_table_id = 2;
  repeated WorkflowVariable outputs = 3;
}

message GatewaySplitActivated {
  string gateway_id = 1;
  string join_gateway_id = 2;
  repeated string selected_target_node_ids = 3;
}

message GatewayTokenArrived {
  string gateway_id = 1;
}

message GatewayJoined {
  string gateway_id = 1;
}

message WorkflowVariable {
  string name = 1;
  oneof value {
    bool boolean_value = 2;
    sint64 integer_value = 3;
    string string_value = 4;
    WorkflowValueList list_value = 5;
  }
}

message WorkflowValueList {
  repeated WorkflowValueItem items = 1;
}

message WorkflowValueItem {
  oneof value {
    bool boolean_value = 1;
    sint64 integer_value = 2;
    string string_value = 3;
    WorkflowValueList list_value = 4;
  }
}

enum MultiInstanceMode {
  MULTI_INSTANCE_MODE_UNSPECIFIED = 0;
  MULTI_INSTANCE_MODE_SEQUENTIAL = 1;
  MULTI_INSTANCE_MODE_PARALLEL = 2;
}

message MultiInstanceStarted {
  string node_id = 1;
  string task_type = 2;
  MultiInstanceMode mode = 3;
  uint32 total_instances = 4;
  uint32 max_parallelism = 5;
  string item_variable = 6;
  repeated WorkflowValueItem items = 7;
}

message MultiInstanceIterationActivated {
  string node_id = 1;
  string task_type = 2;
  uint32 iteration = 3;
  WorkflowValueItem item = 4;
}

message MultiInstanceIterationCompleted {
  string node_id = 1;
  uint32 iteration = 2;
}

message MultiInstanceCompleted {
  string node_id = 1;
}

message BoundaryEventTriggered {
  string boundary_event_id = 1;
  string attached_node_id = 2;
  string target_node_id = 3;
  bool cancel_activity = 4;
  repeated uint32 cancelled_iterations = 5;
  uint32 cancelled_task_tokens = 6;
}

enum BoundaryTriggerKind {
  BOUNDARY_TRIGGER_KIND_UNSPECIFIED = 0;
  BOUNDARY_TRIGGER_KIND_TIMER_DATE = 1;
  BOUNDARY_TRIGGER_KIND_TIMER_DURATION = 2;
  BOUNDARY_TRIGGER_KIND_TIMER_CYCLE = 3;
  BOUNDARY_TRIGGER_KIND_ERROR = 4;
  BOUNDARY_TRIGGER_KIND_MESSAGE = 5;
}

message BoundaryEventArmed {
  string boundary_event_id = 1;
  string attached_node_id = 2;
  string target_node_id = 3;
  bool cancel_activity = 4;
  BoundaryTriggerKind trigger_kind = 5;
  string trigger_reference = 6;
}

message BoundaryEventsDisarmed {
  string attached_node_id = 1;
  repeated string boundary_event_ids = 2;
}

message WorkflowBranchCompleted {
  string end_node_id = 1;
}

enum WorkflowLifecycle {
  WORKFLOW_LIFECYCLE_UNSPECIFIED = 0;
  WORKFLOW_LIFECYCLE_INITIAL = 1;
  WORKFLOW_LIFECYCLE_ACTIVE = 2;
  WORKFLOW_LIFECYCLE_COMPLETED = 3;
}

message WorkflowSnapshot {
  string tenant_id = 1;
  string instance_id = 2;
  uint64 sequence = 3;
  uint32 schema_version = 4;
  string workflow_type = 5;
  string workflow_version = 6;
  WorkflowLifecycle lifecycle = 7;
  string active_node_id = 8;
  string config_version = 9;
  string policy_version = 10;
  string encryption_key_scope = 11;
  repeated WorkflowVariable variables = 12;
  repeated ActiveToken active_tokens = 13;
  repeated PendingGatewayJoin pending_gateway_joins = 14;
  repeated ActiveMultiInstance active_multi_instances = 15;
  repeated ActiveBoundarySubscription active_boundary_subscriptions = 16;
}

message ActiveToken {
  string node_id = 1;
  uint32 count = 2;
}

message PendingGatewayJoin {
  string gateway_id = 1;
  uint32 expected_tokens = 2;
  uint32 arrived_tokens = 3;
}

message ActiveMultiInstance {
  string node_id = 1;
  string task_type = 2;
  MultiInstanceMode mode = 3;
  uint32 total_instances = 4;
  uint32 next_iteration = 5;
  uint32 max_parallelism = 6;
  string item_variable = 7;
  repeated WorkflowValueItem items = 8;
  repeated uint32 active_iterations = 9;
  repeated uint32 completed_iterations = 10;
}

message ActiveBoundarySubscription {
  string boundary_event_id = 1;
  string attached_node_id = 2;
  string target_node_id = 3;
  bool cancel_activity = 4;
  BoundaryTriggerKind trigger_kind = 5;
  string trigger_reference = 6;
  uint64 armed_at_epoch_ms = 7;
}
