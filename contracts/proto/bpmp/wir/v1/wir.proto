syntax = "proto3";

package bpmp.wir.v1;

message WorkflowIntermediateRepresentation {
  uint32 schema_version = 1;
  string workflow_type = 2;
  string workflow_version = 3;
  string start_node_id = 4;
  repeated Node nodes = 5;
  bytes content_hash = 6;
  bytes signature = 7;
  repeated DecisionTable decision_tables = 8;
  string tenant_id = 9;
  repeated CaseModel case_models = 10;
  repeated ExtensionProperty properties = 11;
}

message Node {
  string id = 1;
  oneof kind {
    StartNode start = 2;
    ServiceTaskNode service_task = 3;
    EndNode end = 4;
    ExclusiveGatewayNode exclusive_gateway = 5;
    DecisionTaskNode decision_task = 9;
    ParallelGatewayNode parallel_gateway = 10;
    InclusiveGatewayNode inclusive_gateway = 11;
    CallActivityNode call_activity = 15;
    SubProcessNode sub_process = 16;
    UserTaskNode user_task = 18;
    ScriptTaskNode script_task = 19;
  }
  DataContract data_contract = 6;
  uint64 sla_milliseconds = 7;
  string compensation_handler_id = 8;
  repeated ExtensionProperty properties = 12;
  MultiInstanceSpec multi_instance = 13;
  repeated BoundaryEvent boundary_events = 14;
  string owner_scope_id = 17;
}

message StartNode {
  string next_node_id = 1;
}

message ServiceTaskNode {
  string task_type = 1;
  string next_node_id = 2;
}

message UserTaskNode {
  string task_type = 1;
  string next_node_id = 2;
  string assignment_policy_ref = 3;
  string form_key = 4;
  string result_variable = 5;
}

message ScriptTaskNode {
  string task_type = 1;
  string next_node_id = 2;
  string implementation_ref = 3;
  string implementation_version = 4;
}

message DecisionTaskNode {
  string decision_table_id = 1;
  string next_node_id = 2;
}

message CallActivityNode {
  string called_element = 1;
  string called_version = 2;
  string next_node_id = 3;
}

message SubProcessNode {
  string start_node_id = 1;
  string end_node_id = 2;
  string next_node_id = 3;
}

message EndNode {}

message ExclusiveGatewayNode {
  repeated ConditionalTransition transitions = 1;
  GatewayCoverage coverage = 2;
}

enum GatewayDirection {
  GATEWAY_DIRECTION_UNSPECIFIED = 0;
  GATEWAY_DIRECTION_SPLIT = 1;
  GATEWAY_DIRECTION_JOIN = 2;
}

message ParallelGatewayNode {
  GatewayDirection direction = 1;
  repeated string target_node_ids = 2;
  string paired_gateway_id = 3;
}

message InclusiveGatewayNode {
  GatewayDirection direction = 1;
  repeated ConditionalTransition transitions = 2;
  string next_node_id = 3;
  string paired_gateway_id = 4;
  GatewayCoverage coverage = 5;
}

message ConditionalTransition {
  string target_node_id = 1;
  string condition = 2;
  bool is_default = 3;
  GuardExpression guard = 4;
  BooleanExpression expression = 5;
}

message BooleanExpression {
  oneof expression {
    GuardExpression comparison = 1;
    BooleanJunction conjunction = 2;
    BooleanJunction disjunction = 3;
    BooleanExpression negation = 4;
    bool constant = 5;
  }
}

message BooleanJunction {
  repeated BooleanExpression operands = 1;
}

message GuardExpression {
  string variable = 1;
  ComparisonOperator operator = 2;
  oneof literal {
    bool boolean_value = 3;
    sint64 integer_value = 4;
    string string_value = 5;
  }
}

message GatewayCoverage {
  string variable = 1;
  ValueType value_type = 2;
  repeated string enum_values = 3;
  repeated IntegerInterval integer_intervals = 4;
  bool solver_verified = 5;
}

message IntegerInterval {
  sint64 lower_bound = 1;
  sint64 upper_bound = 2;
  bool lower_unbounded = 3;
  bool upper_unbounded = 4;
}

message DecisionTable {
  string id = 1;
  HitPolicy hit_policy = 2;
  repeated DecisionInput inputs = 3;
  repeated DecisionOutput outputs = 4;
  repeated DecisionRule rules = 5;
}

message DecisionInput {
  string name = 1;
  ValueType value_type = 2;
}

message DecisionOutput {
  string name = 1;
  ValueType value_type = 2;
}

message DecisionRule {
  string id = 1;
  repeated UnaryTest input_tests = 2;
  repeated WorkflowLiteral output_values = 3;
}

message UnaryTest {
  oneof test {
    WorkflowLiteral equal = 1;
    IntegerInterval integer_interval = 2;
    bool any = 3;
  }
}

message WorkflowLiteral {
  oneof value {
    bool boolean_value = 1;
    sint64 integer_value = 2;
    string string_value = 3;
  }
}

enum ComparisonOperator {
  COMPARISON_OPERATOR_UNSPECIFIED = 0;
  COMPARISON_OPERATOR_EQUAL = 1;
  COMPARISON_OPERATOR_NOT_EQUAL = 2;
  COMPARISON_OPERATOR_LESS_THAN = 3;
  COMPARISON_OPERATOR_LESS_THAN_OR_EQUAL = 4;
  COMPARISON_OPERATOR_GREATER_THAN = 5;
  COMPARISON_OPERATOR_GREATER_THAN_OR_EQUAL = 6;
}

enum ValueType {
  VALUE_TYPE_UNSPECIFIED = 0;
  VALUE_TYPE_BOOLEAN = 1;
  VALUE_TYPE_INTEGER = 2;
  VALUE_TYPE_STRING = 3;
}

enum HitPolicy {
  HIT_POLICY_UNSPECIFIED = 0;
  HIT_POLICY_UNIQUE = 1;
  HIT_POLICY_FIRST = 2;
  HIT_POLICY_COLLECT = 3;
}

message DataContract {
  string input_type = 1;
  string output_type = 2;
}

enum MultiInstanceMode {
  MULTI_INSTANCE_MODE_UNSPECIFIED = 0;
  MULTI_INSTANCE_MODE_SEQUENTIAL = 1;
  MULTI_INSTANCE_MODE_PARALLEL = 2;
}

message MultiInstanceSpec {
  MultiInstanceMode mode = 1;
  string collection_expression = 2;
  string item_variable = 3;
  string cardinality_expression = 4;
  uint32 max_parallelism = 5;
  BooleanExpression completion_condition = 6;
}

message BoundaryEvent {
  string id = 1;
  bool cancel_activity = 2;
  string target_node_id = 3;
  EventTrigger trigger = 4;
}

message EventTrigger {
  oneof trigger {
    TimerTrigger timer = 1;
    ErrorTrigger error = 2;
    MessageTrigger message = 3;
  }
}

message TimerTrigger {
  string expression = 1;
  TimerKind kind = 2;
}

enum TimerKind {
  TIMER_KIND_UNSPECIFIED = 0;
  TIMER_KIND_DATE = 1;
  TIMER_KIND_DURATION = 2;
  TIMER_KIND_CYCLE = 3;
}

message ErrorTrigger {
  string error_ref = 1;
}

message MessageTrigger {
  string message_ref = 1;
}

message ExtensionProperty {
  string namespace_uri = 1;
  string element_name = 2;
  string name = 3;
  PropertyValue value = 4;
}

message PropertyValue {
  oneof value {
    string string_value = 1;
    sint64 integer_value = 2;
    bool boolean_value = 3;
    uint64 duration_milliseconds = 4;
  }
}

message CaseModel {
  string id = 1;
  string name = 2;
  repeated CaseStage stages = 3;
  repeated CaseMilestone milestones = 4;
  repeated CaseSentry sentries = 5;
}

message CaseStage {
  string id = 1;
  string name = 2;
  repeated string entry_sentry_ids = 3;
  repeated string exit_sentry_ids = 4;
}

message CaseMilestone {
  string id = 1;
  string name = 2;
  repeated string entry_sentry_ids = 3;
}

message CaseSentry {
  string id = 1;
  string condition = 2;
}
